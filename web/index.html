  <!-- Web app manifest -->
  <link rel="manifest" href="manifest.json">

  <title>PlanetMM — Mingalarbuy</title>

  <!-- JSON-LD Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "PlanetMM",
    "alternateName": "Mingalarbuy",

  <!-- CSP -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https://ssl.gstatic.com https://www.gstatic.com https://mingalarbuy.com https://www.mingalarbuy.com https://app.mingalarbuy.com https://httpbin.org https://picsum.photos https://via.placeholder.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: http: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com; connect-src 'self' https: http: wss: ws: https://firebase.googleapis.com https://firebaseinstallations.googleapis.com https://fcmregistrations.googleapis.com https://www.googleapis.com;">

  <link rel="preconnect" href="https://www.mingalarbuy.com">

</head>
<body>
  <style>
    #planetmm-boot {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1A237E 0%, #4A148C 100%);
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    #planetmm-boot.hide { opacity: 0; pointer-events: none; }
    #planetmm-boot img { width: 96px; height: 96px; border-radius: 20px; margin-bottom: 16px; }
    #planetmm-boot p { margin: 0; font-size: 14px; opacity: 0.85; }
  </style>
  <div id="planetmm-boot" aria-live="polite" aria-busy="true">
    <img src="icons/Icon-192.png" alt="PlanetMM" width="96" height="96">
    <p>PlanetMM ကို ဖွင့်နေပါသည်…</p>
  </div>
  <script src="flutter_bootstrap.js" async></script>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('planetmm-boot');
      if (el) { el.classList.add('hide'); setTimeout(function() { el.remove(); }, 400); }
    });
    window.addEventListener('online', function() {
      console.log('Network: Online');
    });
    window.addEventListener('offline', function() {
      console.log('Network: Offline');
    });
  </script>
</body>
</html>
