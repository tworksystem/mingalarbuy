# =============================================================================
# T-Work / PlanetMM — Flutter Web CORS (Nginx, no WordPress plugin)
# =============================================================================
# Admin: include this file inside the mingalarbuy.com server { } block, then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Flutter web from http://localhost:PORT can call https://mingalarbuy.com/wp-json/*
# without installing the twork-cors PHP plugin.
# =============================================================================

map $http_origin $twork_cors_allow_origin {
    default "";
    "~^https?://localhost(:\d+)?$"       $http_origin;
    "~^https?://127\.0\.0\.1(:\d+)?$"   $http_origin;
    "~^https?://\[::1\](:\d+)?$"         $http_origin;
    "https://mingalarbuy.com"             $http_origin;
    "https://www.mingalarbuy.com"         $http_origin;
    "https://app.mingalarbuy.com"         $http_origin;
}

# OPTIONS preflight for REST API (must run before PHP).
location = /wp-json {
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $twork_cors_allow_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD" always;
        add_header Access-Control-Allow-Headers $http_access_control_request_headers always;
        add_header Access-Control-Max-Age 86400 always;
        add_header Content-Length 0;
        return 204;
    }
    try_files $uri $uri/ /index.php?$args;
}

location ^~ /wp-json/ {
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $twork_cors_allow_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD" always;
        add_header Access-Control-Allow-Headers $http_access_control_request_headers always;
        add_header Access-Control-Max-Age 86400 always;
        add_header Content-Length 0;
        return 204;
    }

    add_header Access-Control-Allow-Origin $twork_cors_allow_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Vary "Origin" always;

    # Keep your existing WordPress PHP handler below (example — adjust to your host):
    # try_files $uri $uri/ /index.php?$args;
    # fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    # include fastcgi_params;
    # fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
}

